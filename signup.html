<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero small-hero">
        <div class="hero-copy">
          <span class="eyebrow">Create an account</span>
          <h1>Join the Vote</h1>
          <p>Register, login, and then cast a vote in the GODLY MADE poll.</p>
        </div>
      </header>

      <main class="main-grid">
        <section class="card signup-card">
          <h2>Sign Up</h2>
          <div class="form-row">
            <label for="signup-username">Username</label>
            <input type="text" id="signup-username" placeholder="Choose a username" autocomplete="username" />
          </div>
          <div class="form-row">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Choose a password" autocomplete="new-password" />
          </div>
          <div class="form-row">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" placeholder="Confirm your password" autocomplete="new-password" />
          </div>
          <button class="primary-btn" onclick="signup()">Create account</button>
          <p class="small">Already registered? <a href="index.html">Login now</a></p>
          <div class="message" id="signup-message"></div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
