<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero small-hero">
        <div class="hero-copy">
          <span class="eyebrow">Create an account</span>
          <h1>Join the Vote</h1>
          <p>Register, login, and then cast a vote in the GODLY MADE poll.</p>
        </div>
      </header>

      <main class="main-grid">
        <section class="card signup-card">
          <h2>No signup required</h2>
          <p>This demo now exports votes as SQL files instead of storing user accounts locally.</p>
          <p class="small">Go back to the main vote page and enter your name to cast a vote.</p>
          <button class="primary-btn" onclick="window.location.href='index.html'">Back to vote</button>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
