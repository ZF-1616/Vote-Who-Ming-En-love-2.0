<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Vote Log</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <span class="eyebrow">Secret Vote Log</span>
        <h1>Who Voted What</h1>
        <p>This page is hidden and not linked anywhere. It reads the saved vote records.</p>
      </div>
    </header>

    <main class="main-grid">
      <section class="card database-card">
        <div class="small" id="secret-count"></div>
        <div class="small" id="secret-notice"></div>
        <div class="db-table-header">
          <span>User</span><span>Latest vote</span><span>Vote history</span>
        </div>
        <div id="secret-list" class="db-list"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
  <script>renderSecretPage();</script>
</body>

</html>
