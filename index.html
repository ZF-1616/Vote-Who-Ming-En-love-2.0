<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote Who Ming En Love 2.0</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <span class="eyebrow">Made by JUSTTESTING and Niranthak</span>
        <h1>Vote Who Ming En Love</h1>
      </div>
    </header>

    <main class="main-grid">
      <section class="card login-card" id="login-card">
        <h2>Member Login</h2>
        <div class="form-row">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="form-row">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <button class="primary-btn" onclick="login()">Enter the vote</button>
        <p class="small">New here? <a href="signup.html">Create your account</a></p>
        <div class="message" id="login-message"></div>
      </section>

      <section class="card vote-card hidden" id="vote-card">
        <div class="vote-header">
          <div>
            <h2 id="greeting">Welcome, Voter</h2>
            <p>Choose your favorite and make your voice count.</p>
            <p class="current-vote" id="current-vote">Previous choice: <span id="previous-choice">none</span></p>
          </div>
          <button class="text-btn" onclick="logout()">Logout</button>
        </div>

        <div class="vote-grid">
          <button class="vote" data-choice="A. 1001" onclick="vote('A. 1001')">A. 1001</button>
          <button class="vote" data-choice="B. M·F" onclick="vote('B. M·F')">B. M·F</button>
          <button class="vote" data-choice="C. TAN" onclick="vote('C. TAN')">C. TAN</button>
        </div>

        <button class="vote danger hidden-dont-click" data-choice="D. DON'T CLICK !!!" onclick="vote('D. DON\'T CLICK !!!'); jumpscare()" title="Do not click this one unless you want a surprise.">D. DON'T CLICK !!!</button>

        <div class="vote-feedback" id="vote-feedback"></div>
      </section>
    </main>
  </div>

  <div class="jump-scare" id="jump-scare">
    <img src="jump-scare.png" alt="Jump-scare" />
  </div>

  <audio id="jump-scare-audio" src="attached_assets/jumpscare.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>

</html>
